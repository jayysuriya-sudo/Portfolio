<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jay Surya | Cinematic Portfolio</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

  <style>
    body { margin:0; background:black; color:white; font-family:Arial; overflow-x:hidden;}
    canvas { position:fixed; top:0; left:0; z-index:-1;}

    section {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    h1 { font-size:4rem; }
    h2 { font-size:2.5rem; }

    .btn {
      margin-top:20px;
      padding:10px 25px;
      border:1px solid white;
      cursor:pointer;
    }

    .projects {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      width:80%;
    }

    .card video { width:100%; border-radius:10px; }
  </style>
</head>

<body>

<section>
  <h1 id="title">JAY SURYA</h1>
  <p>Cinematic Storyteller</p>
  <div class="btn" onclick="scrollToJourney()">Start Journey</div>
</section>

<section id="journey">
  <h2>Explore My Work</h2>
</section>

<section>
  <h2>Projects</h2>
  <div class="projects">
    <div class="card"><video src="p1.mp4" autoplay muted loop></video></div>
    <div class="card"><video src="p2.mp4" autoplay muted loop></video></div>
    <div class="card"><video src="p3.mp4" autoplay muted loop></video></div>
  </div>
</section>

<script>
gsap.from("#title",{opacity:0,y:100,duration:1.5});

function scrollToJourney(){
  document.getElementById("journey").scrollIntoView({behavior:"smooth"});
}

// Three.js background
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const geo = new THREE.SphereGeometry(5,32,32);
const mat = new THREE.MeshBasicMaterial({wireframe:true});
const mesh = new THREE.Mesh(geo,mat);
scene.add(mesh);

camera.position.z = 10;

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.002;
  mesh.rotation.y += 0.003;
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
